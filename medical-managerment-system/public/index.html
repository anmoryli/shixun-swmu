<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <style>
      .app-fallback {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f7; color: #1c1c1e; padding: 24px; text-align: center; z-index: 9999;
      }
      .app-fallback pre {
        max-width: 720px; background: #fff; padding: 16px 20px; border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: left; font-size: 13px;
        white-space: pre-wrap; word-break: break-all; line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
    <script>
      // 启动后 5s 若 #app 仍空,显示诊断信息,便于排查"页面一片空白"。
      // 仅在 Vue 实际未挂载出任何内容时触发,正常渲染时不会显示。
      window.addEventListener('load', function () {
        setTimeout(function () {
          var el = document.getElementById('app');
          if (el && el.childNodes.length === 0) {
            var d = document.createElement('div');
            d.className = 'app-fallback';
            var pre = document.createElement('pre');
            pre.textContent =
              '[前端启动失败诊断]\n\n' +
              'Vue 挂载后 #app 仍为空。可能原因:\n' +
              '  1) 浏览器使用了缓存的旧 JS  -> Ctrl+Shift+R 强制刷新\n' +
              '  2) App.vue / 子组件抛错 -> 打开 DevTools Console 看错误\n' +
              '  3) 首屏组件引用了未注册的组件\n\n' +
              '当前 URL: ' + location.href + '\n' +
              'User-Agent: ' + navigator.userAgent;
            d.appendChild(pre);
            document.body.appendChild(d);
          }
        }, 5000);
      });
    </script>
  </body>
</html>
