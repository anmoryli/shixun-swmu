# Resolve the backend hostname via Docker's embedded DNS (127.0.0.11) at
# request time. This avoids nginx failing at startup when medicine-backend
# is not yet reachable on the compose network.
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 8080;
    server_name _;

    # Variable indirection defers DNS lookup. nginx will only resolve
    # `medicine-backend:8082` once a request actually arrives, by which
    # time the backend container is up.
    set $medicine_backend_upstream "http://backend:8082";

    # Static assets are copied to /usr/share/nginx/html by the Dockerfile.
    root /usr/share/nginx/html;
    index index.html;

    # 安全响应头：防点击劫持/MIME 嗅探/Referrer 泄露。生产 https 还应加 HSTS。
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP:限制资源加载来源,阻断 XSS 注入外发。高德 JSAPI 2.0 硬性要求:
#   script-src 含 'unsafe-eval'(矢量瓦片 WebGLRender 动态构造)与 'unsafe-inline'(javascript: callback);
#   放行 *.amap.com/*.autonavi.com(瓦片与样式)与 *.alicdn.com(反爬脚本与 iconfont 字体)。
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://*.amap.com https://*.autonavi.com https://*.alicdn.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.amap.com https://*.alicdn.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.amap.com https://*.autonavi.com https://*.alicdn.com; worker-src 'self' blob:; font-src 'self' data: https://*.alicdn.com https://*.amap.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    # Aggressively disable caching for static assets so a new image tag
    # is visible immediately. The hashes in the bundle filenames already
    # give cache-busting semantics; this just makes the shell always fresh.
    location ~* \.(?:js|css|html|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://*.amap.com https://*.autonavi.com https://*.alicdn.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.amap.com https://*.alicdn.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.amap.com https://*.autonavi.com https://*.alicdn.com; worker-src 'self' blob:; font-src 'self' data: https://*.alicdn.com https://*.amap.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
        access_log off;
    }

    client_max_body_size 2m;

    location /api/ {
        # When proxy_pass contains a variable, nginx does not append the part
        # of the request URI matched after /api/. Forward the complete original
        # URI explicitly; otherwise /api/login is reduced to /api/ and Spring
        # Security returns code 10006 before the login controller is reached.
        proxy_pass $medicine_backend_upstream$request_uri;
        proxy_http_version 1.1;
        # This is an internal same-origin reverse proxy. Forwarding the browser's
        # Origin makes Spring treat a normal UI request as a direct cross-origin
        # call and can reject /api/login with 403 for LAN/domain deployments.
        proxy_set_header Origin "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location /actuator/health {
        proxy_pass $medicine_backend_upstream/actuator/health;
        access_log off;
    }

    # 药品图片：优先服务前端 public/image 内置样例图（随 web 镜像分发，无需鉴权，
    # 不依赖后端 named volume），未命中再回源后端 /app/uploads 上传目录。
    location /image/ {
        root /usr/share/nginx/html;
        try_files $uri @backend_image;
        expires 7d;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # 用户上传的图片回源后端上传目录，保持单源。
    location @backend_image {
        proxy_pass $medicine_backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # SPA fallback: refresh on /user/profile/1 etc. should return index.html.
    location / {
        # Disable caching for the shell and hashed bundles so users always
        # see the latest build (vite/webpack hashed filenames change per
        # build; the shell index.html must be re-fetched each time).
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://*.amap.com https://*.autonavi.com https://*.alicdn.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.amap.com https://*.alicdn.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.amap.com https://*.autonavi.com https://*.alicdn.com; worker-src 'self' blob:; font-src 'self' data: https://*.alicdn.com https://*.amap.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
