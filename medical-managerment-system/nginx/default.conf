# Resolve the backend hostname via Docker's embedded DNS (127.0.0.11) at
# request time. This avoids nginx failing at startup when medicine-backend
# is not yet reachable on the compose network.
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    # Variable indirection defers DNS lookup. nginx will only resolve
    # `medicine-backend:8082` once a request actually arrives, by which
    # time the backend container is up.
    set $medicine_backend_upstream "http://backend:8082";

    # Static assets are copied to /usr/share/nginx/html by the Dockerfile.
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 2m;

    location /api/ {
        proxy_pass $medicine_backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location /actuator/health {
        proxy_pass $medicine_backend_upstream/actuator/health;
        access_log off;
    }

    # Uploaded images are served by the backend, not the web container.
    # We proxy /image/ to medicine-backend so the SPA keeps a single origin.
    location /image/ {
        proxy_pass $medicine_backend_upstream/image/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header X-Content-Type-Options nosniff;
    }

    # SPA fallback: refresh on /user/profile/1 etc. should return index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
