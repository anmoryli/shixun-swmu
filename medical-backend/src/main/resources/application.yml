server:
  port: ${SERVER_PORT:8082}
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: medical-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://106.54.210.109:3306/medicine?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      maximum-pool-size: ${DB_POOL_SIZE:10}
  redis:
    host: ${REDIS_HOST:106.54.210.109}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:5s}
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  auth:
    token-prefix: 'medicine:auth:token:'
    token-ttl: ${TOKEN_TTL:8h}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:9092,http://127.0.0.1:9092}

logging:
  level:
    com.medicine: ${APP_LOG_LEVEL:INFO}
