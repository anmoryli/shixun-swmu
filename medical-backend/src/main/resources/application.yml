server:
  port: ${SERVER_PORT:8082}
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: medical-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 安全警示：生产应走内网/隧道，启用 useSSL=true&verifyServerCertificate=true 并移除 allowPublicKeyRetrieval。
    # 当前默认远程公网+useSSL=false，SQL 流量（含口令与 PII）明文传输，仅为实训便捷默认，切勿用于生产。
    url: ${DB_URL:jdbc:mysql://106.54.210.109:3306/medicine?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      maximum-pool-size: ${DB_POOL_SIZE:10}
  redis:
    # 安全警示：生产应内网监听并设强口令；当前默认公网 host+空口令仅为实训便捷默认，若 6379 对公网开放将会话全部泄露。
    host: ${REDIS_HOST:106.54.210.109}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:5s}
  cache:
    type: redis
    redis:
      time-to-live: ${DASHBOARD_CACHE_TTL:5m}
      cache-null-values: false
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  cache:
    dashboard-eviction-delay-ms: ${DASHBOARD_CACHE_EVICTION_DELAY_MS:300000}
  auth:
    token-prefix: 'medicine:auth:token:'
    # 持久登录：会话 TTL 与 cookie Max-Age 对齐为 7 天，滑动续期由 TokenService 触发。
    token-ttl: ${TOKEN_TTL:7d}
    cookie:
      # httpOnly cookie：前端 JS 读不到 token，由浏览器自动携带，实现持久登录。
      name: ${COOKIE_NAME:medicine_token}
      domain: ${COOKIE_DOMAIN:}
      path: ${COOKIE_PATH:/}
      # 本地 http 部署需关闭，生产 https 经环境变量 COOKIE_SECURE=true 开启。
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAME_SITE:lax}
      max-age: ${COOKIE_MAX_AGE:7d}
  amap:
    # 高德 Web 服务 Key：仅后端持有，用于 /api/regeo 逆地理编码代理，前端不再可见。
    web-key: ${AMAP_WEB_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:9092,http://127.0.0.1:9092}

logging:
  level:
    com.medicine: ${APP_LOG_LEVEL:INFO}
