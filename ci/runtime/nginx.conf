server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 安全响应头：防点击劫持/MIME 嗅探/Referrer 泄露。生产 https 还应加 HSTS。
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8082/api/;
        # The web gateway already enforces the browser-facing origin boundary.
        # Avoid a false CORS rejection on same-origin proxied login requests.
        proxy_set_header Origin "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /image/ {
        proxy_pass http://backend:8082/image/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /actuator/health {
        proxy_pass http://backend:8082/actuator/health;
        proxy_set_header Host $host;
    }
}
