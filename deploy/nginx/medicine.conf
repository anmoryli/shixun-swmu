upstream medicine_backend {
    server 127.0.0.1:8082;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /opt/medicine/web;
    index index.html;

    # 安全响应头：防点击劫持/MIME 嗅探/Referrer 泄露。生产 https 还应加 HSTS。
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP:限制资源加载来源,阻断 XSS 注入外发。高德地图需放行 webapi/restapi.amap.com。
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://webapi.amap.com https://restapi.amap.com; script-src 'self' https://webapi.amap.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://webapi.amap.com https://restapi.amap.com; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    client_max_body_size 2m;

    location /api/ {
        proxy_pass http://medicine_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location /actuator/health {
        proxy_pass http://medicine_backend/actuator/health;
        access_log off;
    }

    location /image/ {
        alias /opt/medicine/uploads/;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

